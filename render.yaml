services:
  - type: web
    name: bill-sharing-app
    env: python
    plan: free
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt && python migrate.py
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bill_sharing_db
          property: connectionString

databases:
  - name: bill_sharing_db
    plan: free
